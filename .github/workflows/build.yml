name: Build Bundle

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'styles.css'
      - 'build.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - name: Commit bundle if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/app.bundle.js dist/app.bundle.js.map dist/styles.min.css
          if git diff --staged --quiet; then
            echo "No bundle changes."
          else
            git commit -m "chore(build): rebuild bundle [skip ci]"
            git push
          fi
