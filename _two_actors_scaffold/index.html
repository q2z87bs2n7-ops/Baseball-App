<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f1147" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Actor Link" />
  <title>Actor Link</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="dist/styles.min.css?v=0.1.0" />
  <script defer src="dist/app.bundle.js?v=0.1.0"></script>
</head>
<body>
  <header class="app-header">
    <h1>Actor Link</h1>
    <div class="profile-chip" id="profileChip"></div>
  </header>

  <main>
    <section id="home" class="screen active">
      <div class="hero">
        <h2>Six Degrees</h2>
        <p class="muted">Pick two actors. Link them through movies.</p>
        <button class="btn primary" data-go="play">Start a round</button>
        <button class="btn ghost" data-go="scoreboard">Scoreboard</button>
      </div>
    </section>

    <section id="play" class="screen">
      <!-- Active round UI mounts here. See src/ui/play.js -->
      <div class="placeholder">Play screen — see <code>src/ui/play.js</code></div>
    </section>

    <section id="scoreboard" class="screen">
      <div class="placeholder">Scoreboard — see <code>src/ui/scoreboard.js</code></div>
    </section>

    <section id="history" class="screen">
      <div class="placeholder">History — past rounds, replayable</div>
    </section>

    <section id="settings" class="screen">
      <div class="placeholder">
        Settings — profile names, hop limit, link rule
        <p class="version-info">Version <span id="versionLabel">0.1.0</span></p>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button data-go="home" aria-label="Home">Home</button>
    <button data-go="play" aria-label="Play">Play</button>
    <button data-go="scoreboard" aria-label="Scoreboard">Score</button>
    <button data-go="history" aria-label="History">History</button>
    <button data-go="settings" aria-label="Settings">⚙</button>
  </nav>

  <!-- Top-level overlay slots. Never nest inside sections (z-index trap). -->
  <div id="actorOverlay" class="overlay"></div>
  <div id="movieOverlay" class="overlay"></div>
  <div id="revealOverlay" class="overlay"></div>
</body>
</html>
