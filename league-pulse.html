<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League Pulse — MLB Live Feed · v0.9.4-dev</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Team theme vars — overwritten by applyLeaguePulseTheme() on init ── */
  --primary:      #002D72;   /* Mets navy (default) */
  --secondary:    #FF5910;   /* Mets orange (default) */
  --accent:       #FF5910;   /* contrast-safe accent on dark surfaces */
  --header-text:  #ffffff;   /* text on primary-coloured surfaces */
  --accent-text:  #111827;   /* text on --secondary surfaces */
  /* ── Derived dark palette — also overwritten by applyLeaguePulseTheme() */
  --dark:   #0d1a40;
  --card:   #111f47;
  --card2:  #172550;
  --border: #1f3161;
  /* ── Fixed neutrals ─────────────────────────────────────────────────── */
  --text:   #e8eaf0;
  --muted:  #9aa0a8;
  /* ── Semantic feed colours (fixed — not team-aware) ─────────────────── */
  --scoring-bg:     rgba(60,  190, 100, 0.10);
  --scoring-border: rgba(60,  190, 100, 0.28);
  --hr-bg:          rgba(255, 155, 30,  0.10);
  --hr-border:      rgba(255, 155, 30,  0.28);
  --risp-accent:    rgba(255, 200, 0,   0.55);
  --status-bg:      rgba(80,  140, 255, 0.08);
  --status-border:  rgba(80,  140, 255, 0.22);
  /* ── Layout ──────────────────────────────────────────────────────────── */
  --header-h:  56px;
  --ticker-h:  50px;
  --mockbar-h: 48px;
  --radius:    10px;
}

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ── Keyframes ─────────────────────────────────────────────────────────────── */

@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0   rgba(224, 48, 48, 0.65); }
  70%  { box-shadow: 0 0 0 9px rgba(224, 48, 48, 0);    }
  100% { box-shadow: 0 0 0 0   rgba(224, 48, 48, 0);    }
}

@keyframes toast-in {
  from { opacity: 0; transform: translateY(-12px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0)     scale(1);    }
}

@keyframes toast-out {
  from { opacity: 1; transform: translateY(0)    scale(1);    }
  to   { opacity: 0; transform: translateY(-8px) scale(0.96); }
}

@keyframes feed-in {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0);     }
}

@keyframes progress-drain {
  from { width: 100%; }
  to   { width: 0%;   }
}

/* ── Header ────────────────────────────────────────────────────────────────── */

#header {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--header-h);
  background: var(--dark);
  border-bottom: 2px solid var(--primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.pulse-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.025em;
  color: var(--text);
}

#pulseDot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #555;
  flex-shrink: 0;
  transition: background 0.3s;
}

#pulseDot.live {
  background: #e03030;
  animation: pulse-ring 1.8s ease-out infinite;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--muted);
}

#liveCount {
  font-weight: 600;
  color: var(--text);
}

#lastUpdate {
  display: none;
}

@media (min-width: 480px) {
  #lastUpdate { display: inline; }
}

.mock-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(255, 210, 0, 0.12);
  border: 1px solid rgba(255, 210, 0, 0.30);
  color: #ffd000;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ── Mode toggle ────────────────────────────────────────────────────────────── */

#modeToggle {
  display: flex;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 2px;
  gap: 2px;
  flex-shrink: 0;
}

.mode-btn {
  background: transparent;
  border: none;
  border-radius: 6px;
  color: var(--muted);
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}

.mode-btn.active {
  background: color-mix(in srgb, var(--accent) 22%, var(--card));
  color: var(--accent);
}

.mode-btn:not(.active):hover {
  background: var(--card);
  color: var(--text);
}

/* ── Alert stack ────────────────────────────────────────────────────────────── */

#alertStack {
  position: fixed;
  top: calc(var(--header-h) + 10px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  width: min(500px, calc(100vw - 24px));
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}

.alert-toast {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-left: 3px solid #e03030;
  border-radius: var(--radius);
  padding: 10px 14px 12px;
  pointer-events: auto;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  animation: toast-in 0.28s ease;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.alert-toast.dismissing {
  animation: toast-out 0.28s ease forwards;
}

.alert-icon {
  font-size: 20px;
  flex-shrink: 0;
  line-height: 1.2;
}

.alert-body {
  flex: 1;
  min-width: 0;
}

.alert-event {
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.alert-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.alert-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  background: currentColor;
  opacity: 0.35;
  animation: progress-drain var(--toast-duration, 5s) linear forwards;
}

/* ── Game ticker ────────────────────────────────────────────────────────────── */

#gameTicker {
  position: sticky;
  top: var(--header-h);
  z-index: 90;
  min-height: var(--ticker-h);
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

#gameTicker::-webkit-scrollbar        { height: 3px; }
#gameTicker::-webkit-scrollbar-track  { background: transparent; }
#gameTicker::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 3px; }
#gameTicker::-webkit-scrollbar-thumb:hover { background: var(--accent); }

.ticker-game {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
}

.ticker-game:hover {
  background: var(--card2);
}

.ticker-game.status-live {
  border-color: rgba(224, 48, 48, 0.35);
}

.ticker-game.status-final {
  opacity: 0.55;
}

.ticker-game.status-preview {
  opacity: 0.75;
}

/* Feed filter state on ticker chips */
.ticker-game.feed-enabled {
  box-shadow: inset 0 -2px 0 var(--accent);
}
.ticker-game.feed-disabled {
  opacity: 0.32;
  filter: grayscale(0.4);
}
.ticker-game.status-live.feed-disabled {
  border-color: var(--border);
}

/* Expanded RISP chip — two rows */
.ticker-game.has-risp {
  flex-direction: column;
  align-items: stretch;
  gap: 4px;
  padding: 6px 10px 7px;
  white-space: normal;
}
.ticker-top {
  display: flex;
  align-items: center;
  gap: 7px;
}
.ticker-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.ticker-diamond {
  flex-shrink: 0;
}

.feed-item.feed-hidden {
  display: none;
}

.ticker-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #e03030;
  flex-shrink: 0;
  animation: pulse-ring 1.8s ease-out infinite;
}

.ticker-score {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.ticker-score strong {
  font-weight: 800;
}

.ticker-divider {
  font-size: 11px;
  color: var(--border);
  font-weight: 500;
}

.ticker-inning {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
}

.ticker-empty {
  color: var(--muted);
  font-size: 12px;
  padding: 0 4px;
}

/* ── Feed wrap ──────────────────────────────────────────────────────────────── */

#feedWrap {
  max-width: 700px;
  margin: 0 auto;
  padding: 14px 12px calc(var(--mockbar-h) + 24px);
}

#feedEmpty {
  text-align: center;
  padding: 64px 24px;
  color: var(--muted);
}

#feedEmpty .empty-icon {
  font-size: 40px;
  display: block;
  margin-bottom: 14px;
  opacity: 0.6;
}

#feedEmpty .empty-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

#feedEmpty .empty-sub {
  font-size: 13px;
}

/* ── Empty state — upcoming games ───────────────────────────────────────────── */
#feedEmpty.has-upcoming {
  text-align: left;
  padding: 20px 0;
  color: var(--text);
}

.empty-upcoming-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.empty-hype-block {
  margin-bottom: 18px;
}
.empty-hype-headline {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 10px;
}
.empty-hype-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.hype-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  border: 1px solid;
}
.hype-pill.hr      { background: rgba(255,155,30,0.12); border-color: rgba(255,155,30,0.35); color: #ffaa30; }
.hype-pill.scoring { background: rgba(60,190,100,0.10); border-color: rgba(60,190,100,0.30); color: #3dba5a; }
.hype-pill.risp    { background: rgba(255,200,0,0.10);  border-color: rgba(255,200,0,0.30);  color: #ffd000; }
.empty-hype-sub {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}

.upcoming-hero {
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 10px;
  overflow: hidden;
}

.upcoming-hero-kicker {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 10px;
}

.upcoming-matchup-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.upcoming-cap {
  width: 40px;
  height: 40px;
  object-fit: contain;
  flex-shrink: 0;
  filter: drop-shadow(0 0 7px rgba(255,255,255,0.55)) drop-shadow(0 1px 3px rgba(0,0,0,0.55));
}

.upcoming-team-name {
  font-size: 18px;
  font-weight: 900;
  color: #ffffff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

.upcoming-at {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.4);
}

.upcoming-foot {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-top: 14px;
  gap: 8px;
}

.upcoming-foot-time {
  font-size: 20px;
  font-weight: 800;
  color: #ffffff;
}

.upcoming-foot-countdown {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: 3px;
}

.upcoming-foot-venue {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  text-align: right;
}

.upcoming-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.matchup-card {
  background: rgba(0,0,0,.18);
  border: 1px solid rgba(255,255,255,.05);
  border-radius: 8px;
  padding: 10px 14px;
}

.matchup-cap {
  width: 28px;
  height: 28px;
  object-fit: contain;
  display: block;
  margin: 0 auto 2px;
  filter: drop-shadow(0 0 3px rgba(255,255,255,.4));
}

/* ── Feed items ─────────────────────────────────────────────────────────────── */

.feed-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 13px;
  margin-bottom: 6px;
  animation: feed-in 0.28s ease;
}

/* Scoring play — warm red tint */
.feed-item.scoring {
  background: var(--scoring-bg);
  border-color: var(--scoring-border);
}

/* Home run — amber tint, slightly elevated */
.feed-item.homerun {
  background: var(--hr-bg);
  border-color: var(--hr-border);
}

/* RISP — yellow left accent stripe */
.feed-item.risp {
  border-left: 3px solid var(--risp-accent);
}

/* Game status change — centred, blue tint */
.feed-item.status-change {
  background: var(--status-bg);
  border-color: var(--status-border);
  text-align: center;
  padding: 10px 16px;
}

/* ── Feed item internals ────────────────────────────────────────────────────── */

.feed-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 5px;
}

.feed-game-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-weight: 700;
  font-size: 11px;
  color: var(--text);
}

.feed-team-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.feed-sep {
  color: var(--border);
}

.feed-time {
  margin-left: auto;
  font-weight: 400;
  font-size: 11px;
  color: var(--muted);
}

.risp-tag {
  display: inline-block;
  background: rgba(255, 200, 0, 0.14);
  color: #ffd000;
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 5px;
  vertical-align: middle;
}

.play-tag {
  display: inline-block;
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 5px;
  vertical-align: middle;
}
.play-tag.hit-tag  { background: rgba(80,  200, 120, 0.14); color: #50c878; }
.play-tag.walk-tag { background: rgba(100, 160, 255, 0.14); color: #6aacff; }
.play-tag.dp-tag   { background: rgba(220, 100,  60, 0.14); color: #e06040; }
.play-tag.tp-tag   { background: rgba(220,  60,  60, 0.18); color: #e03030; }

.feed-play {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.45;
}

.feed-item.homerun .feed-play {
  font-weight: 600;
}

.feed-score-badge {
  display: inline-block;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 11px;
  font-weight: 600;
  margin-left: 5px;
  vertical-align: middle;
  color: rgba(255, 255, 255, 0.55);
}

/* Scoring team's side — full brightness + bold */
.feed-score-scorer {
  color: #ffffff;
  font-weight: 800;
}

.feed-score-sep {
  color: rgba(255, 255, 255, 0.25);
  margin: 0 4px;
}

/* Status change layout */
.status-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.status-icon {
  font-size: 16px;
}

.status-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.status-sub {
  font-size: 12px;
  color: var(--muted);
}

/* ── Mock controls bar ──────────────────────────────────────────────────────── */

#mockBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--mockbar-h);
  background: var(--dark);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  z-index: 100;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.mock-bar-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

.mock-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 5px 11px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}

.mock-btn:hover {
  background: var(--border);
}

.mock-btn.active {
  background: color-mix(in srgb, var(--accent) 18%, transparent);
  border-color: color-mix(in srgb, var(--accent) 55%, transparent);
  color: var(--accent);
}

.mock-progress {
  margin-left: auto;
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}

/* ── Sound button + panel ────────────────────────────────────────────────────── */

#btnSound {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 15px;
  padding: 4px 6px;
  border-radius: 6px;
  line-height: 1;
  flex-shrink: 0;
  transition: background 0.15s;
}
#btnSound:hover { background: var(--card2); }

#soundPanel {
  position: fixed;
  top: calc(var(--header-h) + 6px);
  right: 12px;
  width: 270px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 150;
  overflow: hidden;
}

.sound-panel-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 15px 11px;
  border-bottom: 1px solid var(--border);
}

.sound-panel-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.sound-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 13px;
  padding: 2px 5px;
  border-radius: 4px;
  line-height: 1;
  font-family: inherit;
}
.sound-close:hover { background: var(--card2); color: var(--text); }

.sound-rows { padding: 6px 0 4px; }

.sound-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 15px;
  gap: 12px;
}

.sound-row.master-row {
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
  padding-bottom: 11px;
}

.sound-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}

.sound-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

/* Dim per-event rows when master is off */
.sound-rows.master-off .sound-row:not(.master-row) {
  opacity: 0.35;
  pointer-events: none;
}

/* Pill toggle */
.sound-toggle {
  position: relative;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
  cursor: pointer;
}
.sound-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

.sound-knob {
  position: absolute;
  inset: 0;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: background 0.2s, border-color 0.2s;
}
.sound-knob::after {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--muted);
  top: 2px;
  left: 2px;
  transition: transform 0.2s, background 0.2s;
}

let mockMode = false;
const MLB_BASE      = 'https://statsapi.mlb.com/api/v1';
const MLB_BASE_V1_1 = 'https://statsapi.mlb.com/api/v1.1';

// ── Theme utilities (ported from index.html) ─────────────────────────────────
function relLuminance(hex){hex=hex.replace('#','');var n=parseInt(hex,16),r=((n>>16)&255)/255,g=((n>>8)&255)/255,b=(n&255)/255;r=r<=0.03928?r/12.92:Math.pow((r+0.055)/1.055,2.4);g=g<=0.03928?g/12.92:Math.pow((g+0.055)/1.055,2.4);b=b<=0.03928?b/12.92:Math.pow((b+0.055)/1.055,2.4);return 0.2126*r+0.7152*g+0.0722*b;}
function contrastRatio(hexA,hexB){var lA=relLuminance(hexA),lB=relLuminance(hexB);return(Math.max(lA,lB)+0.05)/(Math.min(lA,lB)+0.05);}
function hslHex(h,s,l){s/=100;l/=100;var a=s*Math.min(l,1-l),f=function(n){var k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};return'#'+f(0)+f(8)+f(4);}
function hslLighten(hex,targetL){hex=hex.replace('#','');var n=parseInt(hex,16),r=((n>>16)&255)/255,g=((n>>8)&255)/255,b=(n&255)/255,max=Math.max(r,g,b),min=Math.min(r,g,b),h=0,s=0,l=(max+min)/2;if(max!==min){var d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);if(max===r)h=((g-b)/d+(g<b?6:0))/6;else if(max===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6;}return hslHex(Math.round(h*360),Math.round(s*100),Math.round(targetL*100));}
function pickAccent(secondaryHex,cardHex){var sLum=relLuminance(secondaryHex),cCon=contrastRatio(secondaryHex,cardHex);if(sLum>=0.18&&cCon>=3.0)return secondaryHex;var lifted=hslLighten(secondaryHex,0.65);if(contrastRatio(lifted,cardHex)>=3.0)return lifted;return'#FFB273';}
function pickHeaderText(primaryHex){return relLuminance(primaryHex)>0.5?'#0a0f1e':'#ffffff';}

function applyLeaguePulseTheme(primaryHex, secondaryHex) {
  var hueOf = function(hex){hex=hex.replace('#','');var r=parseInt(hex.substr(0,2),16)/255,g=parseInt(hex.substr(2,2),16)/255,b=parseInt(hex.substr(4,2),16)/255,max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min,h=0;if(d){if(max===r)h=((g-b)/d+(g<b?6:0))/6;else if(max===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6;}return Math.round(h*360);};
  var h       = hueOf(primaryHex);
  var cardHex = hslHex(h, 45, 22);
  var l1 = relLuminance(primaryHex), l2 = relLuminance(secondaryHex);
  var ratio   = (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
  var accent  = ratio >= 3 ? secondaryHex : '#ffffff';
  if (relLuminance(accent) < 0.05) accent = '#ffffff';
  var accentText  = relLuminance(accent) > 0.4 ? '#111827' : '#ffffff';
  var safeAccent  = pickAccent(accent, cardHex);
  var headerText  = pickHeaderText(primaryHex);
  var root = document.documentElement;
  root.style.setProperty('--primary',     primaryHex);
  root.style.setProperty('--secondary',   accent);
  root.style.setProperty('--accent',      safeAccent);
  root.style.setProperty('--accent-text', accentText);
  root.style.setProperty('--header-text', headerText);
  root.style.setProperty('--dark',   hslHex(h, 50, 18));
  root.style.setProperty('--card',   cardHex);
  root.style.setProperty('--card2',  hslHex(h, 40, 26));
  root.style.setProperty('--border', hslHex(h, 35, 30));
}

function init() {
  document.getElementById('btnMockMode').classList.toggle('active',  mockMode);
  document.getElementById('btnLiveMode').classList.toggle('active', !mockMode);

  document.addEventListener('click', function(e) {
    var panel = document.getElementById('soundPanel');
    var btn   = document.getElementById('btnSound');
    if (panel.style.display !== 'none'
        && !panel.contains(e.target)
        && !btn.contains(e.target)) {
      panel.style.display = 'none';
    }
  });

  if (mockMode) initMock();
  else          initReal();
}

function switchMode(toReal) {
  mockMode = !toReal;
  document.getElementById('btnMockMode').classList.toggle('active',  !toReal);
  document.getElementById('btnLiveMode').classList.toggle('active',   toReal);

  if (mockTimerId)    { clearInterval(mockTimerId);    mockTimerId    = null; }
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  feedItems       = [];
  gameStates      = {};
  enabledGames    = new Set();
  mockPlayPtrs    = {};
  mockGameQueue   = [];
  playedMockPlays = 0;
  totalMockPlays  = 0;
  isFirstPoll     = true;
  document.getElementById('feed').innerHTML       = '';
  document.getElementById('alertStack').innerHTML = '';
  updateFeedEmpty();

  if (toReal) initReal();
  else        initMock();
}

    var home = TC[g.homeId] || {primary:'#444', abbr:'???', name:'Unknown'};
    gameStates[g.gamePk] = {
      gamePk:      g.gamePk,
      awayId:      g.awayId,
      homeId:      g.homeId,
      awayAbbr:    away.abbr,
      homeAbbr:    home.abbr,
      awayName:    away.name,
      homeName:    home.name,
      awayPrimary: away.primary,
      homePrimary: home.primary,
      awayScore:   0,
      homeScore:   0,
      status:      g.status,   // 'Live' | 'Preview' | 'Final'
      inning:      1,
      halfInning:  'top',
      outs:        0,
      gameTime:    g.gameTime  || null,
      venueName:   g.venueName || null,
    };
    mockPlayPtrs[g.gamePk] = 0;
    totalMockPlays += (MOCK_DATA.plays[g.gamePk] || []).length;
    mockGameQueue.push(g.gamePk);
  });

  enabledGames = new Set(Object.keys(gameStates).map(Number));

  renderTicker();
  renderFeed();
  updateHeader();
  startMockTick();
}

function startMockTick() {
  if (mockTimerId) clearInterval(mockTimerId);
  mockTimerId = setInterval(mockTick, mockSpeedMs);
  setTimeout(mockTick, 400);
}

// ── Game ticker ──────────────────────────────────────────────────────────────
function renderTicker() {
  var ticker = document.getElementById('gameTicker');
  var states = Object.values(gameStates);

  if (!states.length) {
    ticker.innerHTML = '<span class="ticker-empty">No games loaded</span>';
    return;
  }

  // Sort: Live first (most-progressed left), then Preview (by start time), then Final (by start time).
  // Within Live: bottom of inning X > top of inning X; tiebreak by start time then A-Z.
  // Within Preview/Final: earliest start time first; A-Z as tiebreaker.
  var statusOrder = {Live: 0, Preview: 1, Scheduled: 1, Final: 2};
  states.sort(function(a, b) {
    var aSt = statusOrder[a.status] !== undefined ? statusOrder[a.status] : 1;
    var bSt = statusOrder[b.status] !== undefined ? statusOrder[b.status] : 1;
    if (aSt !== bSt) return aSt - bSt;
    if (a.status === 'Live') {
      var aP = a.inning * 2 + (a.halfInning === 'bottom' ? 1 : 0);
      var bP = b.inning * 2 + (b.halfInning === 'bottom' ? 1 : 0);
      if (bP !== aP) return bP - aP;   // higher progress = further left
    }
    // Preview and Final: sort by start time, A-Z tiebreaker
    var aMs = a.gameDateMs || 0;
    var bMs = b.gameDateMs || 0;
    if (aMs !== bMs) return aMs - bMs;
    return a.awayAbbr.localeCompare(b.awayAbbr);
  });

  var html = '';
  states.forEach(function(g) {
    var isLive  = g.status === 'Live';
    var isFinal = g.status === 'Final';
    var isPre   = !isLive && !isFinal;

    var statusClass = isLive  ? 'status-live'
                    : isFinal ? 'status-final'
                    : 'status-preview';

    var half   = g.halfInning === 'top' ? '▲' : '▼';
    // Preview: show scheduled time if available, otherwise PRE
    var innStr = isLive  ? (half + g.inning)
               : isFinal ? 'FINAL'
               : g.gameTime ? g.gameTime : 'PRE';

    var dot = isLive ? '<div class="ticker-live-dot"></div>' : '';

    var hasRisp = isLive && (g.onSecond || g.onThird);
    var filterClass = enabledGames.has(g.gamePk) ? ' feed-enabled' : ' feed-disabled';
    var rispClass   = hasRisp ? ' has-risp' : '';

    if (hasRisp) {
      // Expanded two-row chip: scores on top, diamond + inning on bottom
      html += '<div class="ticker-game ' + statusClass + filterClass + rispClass + '" onclick="toggleGame(' + g.gamePk + ')">'
            + '<div class="ticker-top">'
            + dot
            + '<span class="ticker-score">' + g.awayAbbr + '&nbsp;<strong>' + g.awayScore + '</strong></span>'
            + '<span class="ticker-divider">·</span>'
            + '<span class="ticker-score"><strong>' + g.homeScore + '</strong>&nbsp;' + g.homeAbbr + '</span>'
            + '</div>'
            + '<div class="ticker-bottom">'
            + baseDiamondSvg(g.onFirst, g.onSecond, g.onThird)
            + '<span class="ticker-inning">' + innStr + '</span>'
            + '</div>'
            + '</div>';
    } else {
      html += '<div class="ticker-game ' + statusClass + filterClass + '" onclick="toggleGame(' + g.gamePk + ')">'
            + dot
            + '<span class="ticker-score">' + g.awayAbbr + '&nbsp;<strong>' + g.awayScore + '</strong></span>'
            + '<span class="ticker-divider">·</span>'
            + '<span class="ticker-score"><strong>' + g.homeScore + '</strong>&nbsp;' + g.homeAbbr + '</span>'
            + '<span class="ticker-inning">' + innStr + '</span>'
            + '</div>';
    }
  });

  ticker.innerHTML = html;
}

// ── Header ───────────────────────────────────────────────────────────────────
function updateHeader() {
  var liveCount = Object.values(gameStates).filter(function(g) {
    return g.status === 'Live';
  }).length;

  var dot = document.getElementById('pulseDot');
  if (liveCount > 0) {
    dot.classList.add('live');
  } else {
    dot.classList.remove('live');
  }

  document.getElementById('liveCount').textContent =
    liveCount === 0 ? 'No games live'
    : liveCount === 1 ? '1 game live'
    : liveCount + ' games live';

  var lu = document.getElementById('lastUpdate');
  lu.textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', second: '2-digit'
  });
  lu.style.display = '';
}

// ── Utils ────────────────────────────────────────────────────────────────────
function ordinal(n) {
  if (n === 1) return '1st';
  if (n === 2) return '2nd';
  if (n === 3) return '3rd';
  return n + 'th';
}

function baseDiamondSvg(on1, on2, on3) {
  var dim = 'rgba(255,255,255,0.18)';
  var lit = '#ffd000';
  var glow = 'filter:drop-shadow(0 0 3px rgba(255,208,0,0.85))';
  var s1 = on1 ? ' style="' + glow + '"' : '';
  var s2 = on2 ? ' style="' + glow + '"' : '';
  var s3 = on3 ? ' style="' + glow + '"' : '';
  return '<svg class="ticker-diamond" width="28" height="24" viewBox="0 0 28 24" aria-hidden="true">'
    + '<path d="M14,21 L24,12 L14,3 L4,12 Z" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.2"/>'
    + '<circle cx="14" cy="21" r="2" fill="rgba(255,255,255,0.13)"/>'
    + '<circle' + s1 + ' cx="24" cy="12" r="3" fill="' + (on1 ? lit : dim) + '"/>'
    + '<circle' + s2 + ' cx="14" cy="3"  r="3" fill="' + (on2 ? lit : dim) + '"/>'
    + '<circle' + s3 + ' cx="4"  cy="12" r="3" fill="' + (on3 ? lit : dim) + '"/>'
    + '</svg>';
}

function startCountdown(targetMs) {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  function tick() {
    var el = document.getElementById('heroCountdown');
    if (!el) { clearInterval(countdownTimer); countdownTimer = null; return; }
    var diff = targetMs - Date.now();
    if (diff <= 0) {
      el.textContent = 'Starting now';
    } else if (diff >= 3600000) {
      var hrs  = Math.floor(diff / 3600000);
      var mins = Math.ceil((diff % 3600000) / 60000);
      el.textContent = 'First pitch in ' + hrs + 'h' + (mins > 0 ? ' ' + mins + 'm' : '');
    } else {
      var mins = Math.ceil(diff / 60000);
      el.textContent = 'First pitch in ' + mins + 'm';
    }
  }
  tick();
  countdownTimer = setInterval(tick, 30000);
}

function localDateStr(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}

function scrollToGame(gamePk) {
  var el = document.querySelector('[data-gamepk="' + gamePk + '"]');
  if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

function toggleGame(gamePk) {
  gamePk = +gamePk;
  if (enabledGames.has(gamePk)) {
    enabledGames.delete(gamePk);
    document.querySelectorAll('[data-gamepk="' + gamePk + '"]').forEach(function(el) {
      el.classList.add('feed-hidden');
    });
  } else {
    enabledGames.add(gamePk);
    document.querySelectorAll('[data-gamepk="' + gamePk + '"]').forEach(function(el) {
      el.classList.remove('feed-hidden');
    });
  }
  updateFeedEmpty();
  renderTicker();
}

// ── Feed ─────────────────────────────────────────────────────────────────────
function addFeedItem(gamePk, data) {
  var item = {gamePk: gamePk, data: data, ts: data.playTime || new Date()};
  feedItems.unshift(item);
  var el = prependFeedItem(item);
  if (!enabledGames.has(+gamePk)) el.classList.add('feed-hidden');
  updateFeedEmpty();
}

function prependFeedItem(item) {
  var el   = buildFeedEl(item);
  var feed = document.getElementById('feed');
  feed.insertBefore(el, feed.firstChild);
  return el;
}

function buildFeedEl(item) {
  var el = document.createElement('div');
  var g  = gameStates[item.gamePk];
  var d  = item.data;

  // ── Status-change item ────────────────────────────────────────────────────
  if (d.type === 'status') {
    el.className = 'feed-item status-change';
    el.setAttribute('data-gamepk', item.gamePk);
    el.innerHTML =
      '<div class="status-row">'
      + '<span class="status-icon">' + d.icon + '</span>'
      + '<span class="status-label">' + d.label + '</span>'
      + '<span class="status-sub">' + d.sub + '</span>'
      + '</div>';
    return el;
  }

  // ── Play item ─────────────────────────────────────────────────────────────
  var cls = 'feed-item';
  if      (d.playClass === 'homerun')  cls += ' homerun';
  else if (d.playClass === 'scoring')  cls += ' scoring';
  else if (d.playClass === 'risp')     cls += ' risp';
  el.className = cls;
  el.setAttribute('data-gamepk', item.gamePk);

  var half    = d.halfInning === 'top' ? '▲' : '▼';
  var innStr  = half + ordinal(d.inning);
  var outsStr = d.outs === 1 ? '1 out' : d.outs + ' outs';
  var timeStr = item.ts.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});

  // Coloured team dots + score line
  var metaHtml =
    '<div class="feed-meta">'
    + '<span class="feed-game-tag">'
    + '<span class="feed-team-dot" style="background:' + g.awayPrimary + '"></span>'
    + g.awayAbbr + '&nbsp;<strong>' + d.awayScore + '</strong>'
    + '</span>'
    + '<span class="feed-sep">·</span>'
    + '<span class="feed-game-tag">'
    + '<strong>' + d.homeScore + '</strong>&nbsp;' + g.homeAbbr
    + '<span class="feed-team-dot" style="background:' + g.homePrimary + '"></span>'
    + '</span>'
    + '<span class="feed-sep">·</span>'
    + '<span>' + innStr + '</span>'
    + '<span class="feed-sep">·</span>'
    + '<span>' + outsStr + '</span>'
    + '<span class="feed-time">' + timeStr + '</span>'
    + '</div>';

  // Play icon prefix
  var icon = d.event === 'Home Run' ? '💥 '
           : d.scoring              ? '🟢 '
           : '';

  // Score badge: AWAY N · N HOME — scoring side full-brightness, other side dimmed
  var scoreBadge = '';
  if (d.scoring) {
    var awayScores = (d.halfInning === 'top');
    var awayHtml = awayScores
      ? '<span class="feed-score-scorer">' + g.awayAbbr + '&thinsp;' + d.awayScore + '</span>'
      : g.awayAbbr + '&thinsp;' + d.awayScore;
    var homeHtml = !awayScores
      ? '<span class="feed-score-scorer">' + d.homeScore + '&thinsp;' + g.homeAbbr + '</span>'
      : d.homeScore + '&thinsp;' + g.homeAbbr;
    scoreBadge = '<span class="feed-score-badge">'
      + awayHtml
      + '<span class="feed-score-sep">·</span>'
      + homeHtml
      + '</span>';
  }

  // RISP inline badge — only on non-scoring plays
  var rispBadge = (d.risp && !d.scoring)
    ? '<span class="risp-tag">⚡ RISP</span>'
    : '';

  // Hit / walk / out-event badges
  var evt = d.event || '';
  var playBadge = '';
  if      (evt === 'Single')                          playBadge = '<span class="play-tag hit-tag">1B</span>';
  else if (evt === 'Double')                          playBadge = '<span class="play-tag hit-tag">2B</span>';
  else if (evt === 'Triple')                          playBadge = '<span class="play-tag hit-tag">3B</span>';
  else if (evt === 'Walk' || evt === 'Intent Walk')   playBadge = '<span class="play-tag walk-tag">BB</span>';
  else if (evt.indexOf('Triple Play') !== -1)         playBadge = '<span class="play-tag tp-tag">TP</span>';
  else if (evt.indexOf('Double Play') !== -1)         playBadge = '<span class="play-tag dp-tag">DP</span>';

  var playHtml =
    '<div class="feed-play">' + icon + d.desc + rispBadge + playBadge + scoreBadge + '</div>';

  el.innerHTML = metaHtml + playHtml;
  return el;
}

function renderFeed() {
  var feed = document.getElementById('feed');
  feed.innerHTML = '';
  feedItems.forEach(function(item) {
    var el = buildFeedEl(item);
    if (!enabledGames.has(+item.gamePk)) el.classList.add('feed-hidden');
    feed.appendChild(el);
  });
  updateFeedEmpty();
}

// ── Alerts ────────────────────────────────────────────────────────────────────
function showAlert(opts) {
  var id       = ++alertId;
  var icon     = opts.icon     || '🔔';
  var evtLabel = opts.event    || '';
  var desc     = opts.desc     || '';
  var color    = opts.color    || '#e03030';
  var duration = opts.duration || 5000;

  var stack = document.getElementById('alertStack');
  var el    = document.createElement('div');
  el.className = 'alert-toast';
  el.style.borderLeftColor = color;
  el.style.setProperty('--toast-duration', duration + 'ms');
  el.innerHTML =
    '<span class="alert-icon">'  + icon     + '</span>'
    + '<div class="alert-body">'
    +   '<div class="alert-event">' + evtLabel + '</div>'
    +   '<div class="alert-desc">'  + desc     + '</div>'
    + '</div>'
    + '<div class="alert-progress"></div>';

  el.addEventListener('click', function() { dismissAlert(el); });
  stack.appendChild(el);

  setTimeout(function() { dismissAlert(el); }, duration);
}

function dismissAlert(el) {
  if (!el.parentNode) return;
  el.classList.add('dismissing');
  setTimeout(function() { el.remove(); }, 300);
}

// ── Mock engine ───────────────────────────────────────────────────────────────
function mockTick() {
  var pks     = mockGameQueue;
  var found   = false;
  var n       = pks.length;

  for (var i = 0; i < n; i++) {
    var pk    = pks.shift();
    pks.push(pk);                                   // rotate

    var plays = MOCK_DATA.plays[pk] || [];
    var ptr   = mockPlayPtrs[pk] || 0;

    if (ptr < plays.length) {
      advanceMockGame(pk, plays[ptr]);
      mockPlayPtrs[pk] = ptr + 1;
      playedMockPlays++;
      found = true;
      break;
    }
  }

  if (!found) {
    // All plays exhausted — wrap up any still-live games
    Object.values(gameStates).forEach(function(g) {
      if (g.status === 'Live') {
        playSound('gameEnd');
        g.status = 'Final';
        addFeedItem(g.gamePk, {
          type:  'status',
          icon:  '🏁',
          label: 'Game Final',
          sub:   g.awayAbbr + ' ' + g.awayScore + ', ' + g.homeAbbr + ' ' + g.homeScore,
        });
      }
    });
    if (mockTimerId) { clearInterval(mockTimerId); mockTimerId = null; }
    renderTicker();
  }

  updateMockProgress();
  updateHeader();
}

function advanceMockGame(gamePk, play) {
  var g = gameStates[gamePk];
  if (!g) return;

  // Game-start sentinel
  if (play.event === '__GAME_START__') {
    g.status = 'Live';
    addFeedItem(gamePk, {
      type:  'status',
      icon:  '⚾',
      label: 'Game underway!',
      sub:   g.awayAbbr + ' @ ' + g.homeAbbr,
    });
    playSound('gameStart');
    renderTicker();
    return;
  }

  // Update game state
  g.awayScore  = play.aScore;
  g.homeScore  = play.hScore;
  g.inning     = play.inn;
  g.halfInning = play.half;
  g.outs       = play.outs;
  // Mock base state: approximate from risp flag (scoring plays clear bases)
  g.onFirst  = false;
  g.onSecond = !play.scoring && !!play.risp;
  g.onThird  = false;

  // Classify
  var playClass = play.event === 'Home Run' ? 'homerun'
                : play.scoring              ? 'scoring'
                : play.risp                 ? 'risp'
                : 'normal';

  addFeedItem(gamePk, {
    type:       'play',
    event:      play.event,
    desc:       play.desc,
    scoring:    play.scoring,
    awayScore:  play.aScore,
    homeScore:  play.hScore,
    inning:     play.inn,
    halfInning: play.half,
    outs:       play.outs,
    risp:       play.risp,
    playClass:  playClass,
  });

  // Alerts + sounds for notable events
  var teamColor = play.half === 'top' ? g.awayPrimary : g.homePrimary;
  if (play.event === 'Home Run') {
    showAlert({
      icon:     '💥',
      event:    'HOME RUN · ' + g.awayAbbr + ' ' + play.aScore + ', ' + g.homeAbbr + ' ' + play.hScore,
      desc:     play.desc,
      color:    teamColor,
      duration: 6000,
    });
    playSound('hr');
  } else if (play.scoring) {
    showAlert({
      icon:     '🟢',
      event:    'RUN SCORES · ' + g.awayAbbr + ' ' + play.aScore + ', ' + g.homeAbbr + ' ' + play.hScore,
      desc:     play.desc,
      color:    teamColor,
      duration: 4000,
    });
    playSound('run');
  } else if (play.event && play.event.indexOf('Triple Play') !== -1) {
    showAlert({
      icon:     '🔀',
      event:    'TRIPLE PLAY · ' + g.awayAbbr + ' @ ' + g.homeAbbr,
      desc:     play.desc,
      color:    '#9b59b6',
      duration: 5000,
    });
    playSound('tp');
  } else if (play.event && play.event.indexOf('Double Play') !== -1) {
    playSound('dp');
  } else if (play.risp) {
    playSound('risp');
  }

  renderTicker();
}

// ── Mock controls ─────────────────────────────────────────────────────────────
function setMockSpeed(ms, btn) {
  mockSpeedMs = ms;
  document.querySelectorAll('.mock-btn').forEach(function(b) {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  startMockTick();
}

function skipMockPlay() {
  mockTick();
}

function resetMock() {
  if (mockTimerId) { clearInterval(mockTimerId); mockTimerId = null; }
  feedItems       = [];
  gameStates      = {};
  enabledGames    = new Set();
  mockPlayPtrs    = {};
  mockGameQueue   = [];
  playedMockPlays = 0;
  totalMockPlays  = 0;
  document.getElementById('feed').innerHTML       = '';
  document.getElementById('alertStack').innerHTML = '';
  updateFeedEmpty();
  // Reset speed buttons — Normal active by default
  document.querySelectorAll('.mock-btn').forEach(function(b) { b.classList.remove('active'); });
  var btnNormal = document.getElementById('btnNormal');
  if (btnNormal) { btnNormal.classList.add('active'); mockSpeedMs = 6000; }
  initMock();
}

function updateMockProgress() {
  document.getElementById('mockProgress').textContent =
    playedMockPlays + ' / ' + totalMockPlays + ' plays';
}

// ── Real polling ──────────────────────────────────────────────────────────────
function initReal() {
  document.getElementById('mockBar').style.display = 'none';
  applyLeaguePulseTheme('#002D72', '#FF5910'); // Mets default; swap for other teams
  poll();
  setInterval(poll, 15000);
}

async function poll() {
  var dateStr = localDateStr(new Date());
  try {
    var r = await fetch(MLB_BASE + '/schedule?sportId=1&date=' + dateStr + '&hydrate=linescore,team');
    var d = await r.json();
    var games = (d.dates || []).flatMap(function(dt) { return dt.games || []; });

    games.forEach(function(g) {
      var pk        = g.gamePk;
      var newStatus = g.status.abstractGameState;
      var detailed  = g.status.detailedState || '';
      var away      = g.teams.away;
      var home      = g.teams.home;
      var awayTc    = TC[away.team.id] || {primary:'#444'};
      var homeTc    = TC[home.team.id] || {primary:'#444'};
      var ls        = g.linescore || {};

      // Format scheduled time for preview display (e.g. "7:05 PM")
      var gameTime = null;
      var gameDateMs = null;
      if (g.gameDate) {
        try {
          var gd = new Date(g.gameDate);
          gameTime  = gd.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
          gameDateMs = gd.getTime();
        } catch(e) {}
      }

      if (!gameStates[pk]) {
        gameStates[pk] = {
          gamePk:        pk,
          awayId:        away.team.id,
          homeId:        home.team.id,
          awayAbbr:      away.team.abbreviation,
          homeAbbr:      home.team.abbreviation,
          awayName:      away.team.name,
          homeName:      home.team.name,
          awayPrimary:   awayTc.primary,
          homePrimary:   homeTc.primary,
          awayScore:     away.score  || 0,
          homeScore:     home.score  || 0,
          status:        newStatus,
          detailedState: detailed,
          inning:        ls.currentInning   || 1,
          halfInning:    (ls.inningHalf     || 'Top').toLowerCase(),
          outs:          ls.outs            || 0,
          playCount:     0,
          lastTimestamp: null,
          gameTime:      gameTime,
          gameDateMs:    gameDateMs,
          venueName:     g.venue ? g.venue.name : null,
          onFirst:       !!(ls.offense && ls.offense.first),
          onSecond:      !!(ls.offense && ls.offense.second),
          onThird:       !!(ls.offense && ls.offense.third),
        };
        enabledGames.add(pk);
      } else {
        var prev = gameStates[pk];
        if (gameTime)   prev.gameTime   = gameTime;
        if (gameDateMs) prev.gameDateMs = gameDateMs;

        // Game underway: only fire when detailedState becomes "In Progress" — not on warmup
        if (prev.detailedState !== 'In Progress' && detailed === 'In Progress') {
          addFeedItem(pk, {type:'status', icon:'⚾', label:'Game underway!',
            sub: prev.awayAbbr + ' @ ' + prev.homeAbbr});
          playSound('gameStart');
        }

        // Game final
        if (prev.status !== 'Final' && newStatus === 'Final') {
          addFeedItem(pk, {type:'status', icon:'🏁', label:'Game Final',
            sub: prev.awayAbbr + ' ' + (away.score||0) + ', ' + prev.homeAbbr + ' ' + (home.score||0)});
          playSound('gameEnd');
        }

        // Delay — can happen mid-game without a status change
        if (detailed.toLowerCase().indexOf('delay') !== -1
            && prev.detailedState.toLowerCase().indexOf('delay') === -1) {
          addFeedItem(pk, {type:'status', icon:'🌧️', label:'Game Delayed', sub: detailed});
        }

        prev.detailedState = detailed;
        prev.status     = newStatus;
        prev.awayScore  = away.score  || 0;
        prev.homeScore  = home.score  || 0;
        prev.inning     = ls.currentInning   || prev.inning;
        prev.halfInning = (ls.inningHalf     || 'Top').toLowerCase();
        prev.outs       = ls.outs            || 0;
        prev.onFirst    = !!(ls.offense && ls.offense.first);
        prev.onSecond   = !!(ls.offense && ls.offense.second);
        prev.onThird    = !!(ls.offense && ls.offense.third);
      }
    });

    // Fetch play-by-play for every live game in parallel
    var liveGames = games.filter(function(g) {
      return g.status.abstractGameState === 'Live';
    });
    await Promise.all(liveGames.map(function(g) { return pollGamePlays(g.gamePk); }));

    // After initial history load, sort all feed items chronologically across games
    if (isFirstPoll && feedItems.length > 0) {
      feedItems.sort(function(a, b) { return b.ts - a.ts; }); // newest first
      renderFeed();
    }
    isFirstPoll = false;

    renderTicker();
    updateHeader();
    updateFeedEmpty();
  } catch(e) {
    console.error('poll error', e);
  }
}

async function pollGamePlays(gamePk) {
  try {
    var g = gameStates[gamePk];
    if (!g) return;

    // Stale check: skip playByPlay fetch if the game state hasn't changed
    var tsResp = await fetch(MLB_BASE_V1_1 + '/game/' + gamePk + '/feed/live/timestamps');
    var tsData = await tsResp.json();
    var latestTs = Array.isArray(tsData) ? tsData[tsData.length - 1] : null;
    if (latestTs && latestTs === g.lastTimestamp) return;
    if (latestTs) g.lastTimestamp = latestTs;

    var r     = await fetch(MLB_BASE + '/game/' + gamePk + '/playByPlay');
    var data  = await r.json();

    var plays     = (data.allPlays || []).filter(function(p) { return p.about && p.about.isComplete; });
    var lastCount = g.playCount || 0;
    var isHistory = (lastCount === 0 && plays.length > 0);
    var newPlays  = plays.slice(lastCount);

    newPlays.forEach(function(play) {
      var event      = (play.result && play.result.event)       || '';
      var isScoringP = (play.about  && play.about.isScoringPlay)|| false;
      var aScore     = (play.result && play.result.awayScore != null) ? play.result.awayScore : g.awayScore;
      var hScore     = (play.result && play.result.homeScore != null) ? play.result.homeScore : g.homeScore;
      var inning     = (play.about  && play.about.inning)       || g.inning;
      var halfInning = (play.about  && play.about.halfInning)   || g.halfInning;
      var outs       = (play.count  && play.count.outs)         || 0;
      var desc       = (play.result && play.result.description) || '—';

      // RISP: runner standing on 2nd or 3rd at the END of the play
      var runners  = play.runners || [];
      var hasRISP  = runners.some(function(r) {
        return r.movement && !r.movement.isOut
          && (r.movement.end === '2B' || r.movement.end === '3B');
      });

      var playClass = event === 'Home Run' ? 'homerun'
                    : isScoringP           ? 'scoring'
                    : hasRISP              ? 'risp'
                    : 'normal';

      var playTime = null;
      if (play.about && play.about.startTime) {
        try { playTime = new Date(play.about.startTime); } catch(e) {}
      }

      addFeedItem(gamePk, {
        type:'play', event:event, desc:desc,
        scoring:isScoringP, awayScore:aScore, homeScore:hScore,
        inning:inning, halfInning:halfInning, outs:outs,
        risp:hasRISP, playClass:playClass, playTime:playTime,
      });

      // No alerts or sounds for historical plays loaded on page open
      if (!isHistory) {
        var teamColor = halfInning === 'top' ? g.awayPrimary : g.homePrimary;
        if (event === 'Home Run') {
          showAlert({icon:'💥',
            event:'HOME RUN · ' + g.awayAbbr + ' ' + aScore + ', ' + g.homeAbbr + ' ' + hScore,
            desc:desc, color:teamColor, duration:6000});
          playSound('hr');
        } else if (isScoringP) {
          showAlert({icon:'🟢',
            event:'RUN SCORES · ' + g.awayAbbr + ' ' + aScore + ', ' + g.homeAbbr + ' ' + hScore,
            desc:desc, color:teamColor, duration:4000});
          playSound('run');
        } else if (event.indexOf('Triple Play') !== -1) {
          showAlert({icon:'🔀',
            event:'TRIPLE PLAY · ' + g.awayAbbr + ' @ ' + g.homeAbbr,
            desc:desc, color:'#9b59b6', duration:5000});
          playSound('tp');
        } else if (event.indexOf('Double Play') !== -1) {
          playSound('dp');
        } else if (hasRISP) {
          playSound('risp');
        }
      }
    });

    g.playCount = plays.length;
  } catch(e) { /* silent — one game failure must not break others */ }
}

// ── Sound settings ───────────────────────────────────────────────────────────
var soundSettings = {
  master:    false,
  hr:        true,
  run:       true,
  risp:      true,
  dp:        true,
  tp:        true,
  gameStart: true,
  gameEnd:   true,
};

function toggleSoundPanel() {
  var p = document.getElementById('soundPanel');
  p.style.display = p.style.display === 'none' ? '' : 'none';
}

function setSoundPref(key, val) {
  soundSettings[key] = val;
  if (key === 'master') {
    document.getElementById('soundRows').classList.toggle('master-off', !val);
  }
}

function playSound(type) {
  if (!soundSettings.master || !soundSettings[type]) return;
  if      (type === 'hr')        playHrSound();
  else if (type === 'run')       playRunSound();
  else if (type === 'risp')      playRispSound();
  else if (type === 'dp')        playDpSound();
  else if (type === 'tp')        playTpSound();
  else if (type === 'gameStart') playGameStartSound();
  else if (type === 'gameEnd')   playGameEndSound();
}

// _beep: notes = [{freq, start, dur, vol, wave}]
function _beep(notes) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    notes.forEach(function(n) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = n.wave || 'sine';
      osc.frequency.value = n.freq;
      var t = ctx.currentTime + (n.start || 0);
      gain.gain.setValueAtTime(n.vol || 0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + n.dur);
      osc.start(t);
      osc.stop(t + n.dur + 0.02);
    });
    var maxEnd = notes.reduce(function(m, n) { return Math.max(m, (n.start||0) + n.dur); }, 0);
    setTimeout(function() { try { ctx.close(); } catch(e) {} }, (maxEnd + 1.2) * 1000);
  } catch(e) {}
}

// Ascending major arpeggio C5-E5-G5-C6
function playHrSound() {
  _beep([
    {freq:523,  start:0,    dur:0.30, vol:0.18},
    {freq:659,  start:0.07, dur:0.28, vol:0.18},
    {freq:784,  start:0.14, dur:0.28, vol:0.18},
    {freq:1047, start:0.21, dur:0.42, vol:0.18},
  ]);
}

// Two rising notes G4→B4
function playRunSound() {
  _beep([
    {freq:392, start:0,    dur:0.18, vol:0.15},
    {freq:494, start:0.13, dur:0.25, vol:0.15},
  ]);
}

// Soft high triangle ping A5
function playRispSound() {
  _beep([{freq:880, start:0, dur:0.12, vol:0.08, wave:'triangle'}]);
}

// Bright two-note rise C5→G5
function playGameStartSound() {
  _beep([
    {freq:523, start:0,    dur:0.22, vol:0.16},
    {freq:784, start:0.18, dur:0.38, vol:0.16},
  ]);
}

// Three-note descend G5→E5→C5
function playGameEndSound() {
  _beep([
    {freq:784, start:0,    dur:0.25, vol:0.14},
    {freq:659, start:0.22, dur:0.25, vol:0.14},
    {freq:523, start:0.44, dur:0.45, vol:0.14},
  ]);
}

// Two descending notes — groaner for DP
function playDpSound() {
  _beep([
    {freq:440, start:0,    dur:0.18, vol:0.13},
    {freq:330, start:0.15, dur:0.28, vol:0.13},
  ]);
}

// Three quick descending notes — rarer, more dramatic for TP
function playTpSound() {
  _beep([
    {freq:523, start:0,    dur:0.16, vol:0.15},
    {freq:415, start:0.13, dur:0.16, vol:0.15},
    {freq:311, start:0.26, dur:0.32, vol:0.15},
  ]);
}

// ── Start ────────────────────────────────────────────────────────────────────
init();
</script>
