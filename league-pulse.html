<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League Pulse — MLB Live Feed · v0.1</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dark:   #0f1520;
  --card:   #161e2e;
  --card2:  #1c2540;
  --border: #253050;
  --text:   #e8eaf0;
  --muted:  #7a8299;
  --scoring-bg: rgba(220, 60, 40, 0.10);
  --scoring-border: rgba(220, 60, 40, 0.28);
  --hr-bg:  rgba(255, 155, 30, 0.10);
  --hr-border: rgba(255, 155, 30, 0.28);
  --risp-accent: rgba(255, 200, 0, 0.55);
  --status-bg: rgba(80, 140, 255, 0.08);
  --status-border: rgba(80, 140, 255, 0.22);
  --header-h: 56px;
  --ticker-h: 50px;
  --mockbar-h: 48px;
  --radius: 10px;
}

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ── Keyframes ─────────────────────────────────────────────────────────────── */

@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0   rgba(224, 48, 48, 0.65); }
  70%  { box-shadow: 0 0 0 9px rgba(224, 48, 48, 0);    }
  100% { box-shadow: 0 0 0 0   rgba(224, 48, 48, 0);    }
}

@keyframes toast-in {
  from { opacity: 0; transform: translateY(-12px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0)     scale(1);    }
}

@keyframes toast-out {
  from { opacity: 1; transform: translateY(0)    scale(1);    }
  to   { opacity: 0; transform: translateY(-8px) scale(0.96); }
}

@keyframes feed-in {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0);     }
}

@keyframes progress-drain {
  from { width: 100%; }
  to   { width: 0%;   }
}

/* ── Header ────────────────────────────────────────────────────────────────── */

#header {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--header-h);
  background: rgba(10, 14, 28, 0.97);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.pulse-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.025em;
  color: var(--text);
}

#pulseDot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #555;
  flex-shrink: 0;
  transition: background 0.3s;
}

#pulseDot.live {
  background: #e03030;
  animation: pulse-ring 1.8s ease-out infinite;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--muted);
}

#liveCount {
  font-weight: 600;
  color: var(--text);
}

#lastUpdate {
  display: none;
}

@media (min-width: 480px) {
  #lastUpdate { display: inline; }
}

.mock-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(255, 210, 0, 0.12);
  border: 1px solid rgba(255, 210, 0, 0.30);
  color: #ffd000;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ── Alert stack ────────────────────────────────────────────────────────────── */

#alertStack {
  position: fixed;
  top: calc(var(--header-h) + 10px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  width: min(500px, calc(100vw - 24px));
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}

.alert-toast {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-left: 3px solid #e03030;
  border-radius: var(--radius);
  padding: 10px 14px 12px;
  pointer-events: auto;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  animation: toast-in 0.28s ease;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.alert-toast.dismissing {
  animation: toast-out 0.28s ease forwards;
}

.alert-icon {
  font-size: 20px;
  flex-shrink: 0;
  line-height: 1.2;
}

.alert-body {
  flex: 1;
  min-width: 0;
}

.alert-event {
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.alert-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.alert-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  background: currentColor;
  opacity: 0.35;
  animation: progress-drain var(--toast-duration, 5s) linear forwards;
}

/* ── Game ticker ────────────────────────────────────────────────────────────── */

#gameTicker {
  position: sticky;
  top: var(--header-h);
  z-index: 90;
  height: var(--ticker-h);
  background: rgba(8, 12, 24, 0.98);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
}

#gameTicker::-webkit-scrollbar { display: none; }

.ticker-game {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
}

.ticker-game:hover {
  background: var(--card2);
}

.ticker-game.status-live {
  border-color: rgba(224, 48, 48, 0.35);
}

.ticker-game.status-final {
  opacity: 0.55;
}

.ticker-game.status-preview {
  opacity: 0.75;
}

.ticker-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #e03030;
  flex-shrink: 0;
  animation: pulse-ring 1.8s ease-out infinite;
}

.ticker-score {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.ticker-score strong {
  font-weight: 800;
}

.ticker-divider {
  font-size: 11px;
  color: var(--border);
  font-weight: 500;
}

.ticker-inning {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
}

.ticker-empty {
  color: var(--muted);
  font-size: 12px;
  padding: 0 4px;
}

/* ── Feed wrap ──────────────────────────────────────────────────────────────── */

#feedWrap {
  max-width: 700px;
  margin: 0 auto;
  padding: 14px 12px calc(var(--mockbar-h) + 24px);
}

#feedEmpty {
  text-align: center;
  padding: 64px 24px;
  color: var(--muted);
}

#feedEmpty .empty-icon {
  font-size: 40px;
  display: block;
  margin-bottom: 14px;
  opacity: 0.6;
}

#feedEmpty .empty-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

#feedEmpty .empty-sub {
  font-size: 13px;
}

/* ── Feed items ─────────────────────────────────────────────────────────────── */

.feed-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 13px;
  margin-bottom: 6px;
  animation: feed-in 0.28s ease;
}

/* Scoring play — warm red tint */
.feed-item.scoring {
  background: var(--scoring-bg);
  border-color: var(--scoring-border);
}

/* Home run — amber tint, slightly elevated */
.feed-item.homerun {
  background: var(--hr-bg);
  border-color: var(--hr-border);
}

/* RISP — yellow left accent stripe */
.feed-item.risp {
  border-left: 3px solid var(--risp-accent);
}

/* Game status change — centred, blue tint */
.feed-item.status-change {
  background: var(--status-bg);
  border-color: var(--status-border);
  text-align: center;
  padding: 10px 16px;
}

/* ── Feed item internals ────────────────────────────────────────────────────── */

.feed-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 5px;
}

.feed-game-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-weight: 700;
  font-size: 11px;
  color: var(--text);
}

.feed-team-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.feed-sep {
  color: var(--border);
}

.feed-time {
  margin-left: auto;
  font-weight: 400;
  font-size: 11px;
  color: var(--muted);
}

.risp-tag {
  display: inline-block;
  background: rgba(255, 200, 0, 0.14);
  color: #ffd000;
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.feed-play {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.45;
}

.feed-item.homerun .feed-play {
  font-weight: 600;
}

.feed-score-badge {
  display: inline-block;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 11px;
  font-weight: 700;
  margin-left: 5px;
  vertical-align: middle;
}

/* Status change layout */
.status-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.status-icon {
  font-size: 16px;
}

.status-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.status-sub {
  font-size: 12px;
  color: var(--muted);
}

/* ── Mock controls bar ──────────────────────────────────────────────────────── */

#mockBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--mockbar-h);
  background: rgba(8, 12, 24, 0.98);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  z-index: 100;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.mock-bar-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

.mock-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 5px 11px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}

.mock-btn:hover {
  background: var(--border);
}

.mock-btn.active {
  background: rgba(79, 157, 232, 0.18);
  border-color: rgba(79, 157, 232, 0.45);
  color: #6ab4f0;
}

.mock-progress {
  margin-left: auto;
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}

/* ── Responsive ─────────────────────────────────────────────────────────────── */

@media (max-width: 480px) {
  .mock-bar-label { display: none; }
  #feedWrap { padding-left: 8px; padding-right: 8px; }
  .pulse-brand { font-size: 16px; }
}
</style>
</head>

// ── Config ───────────────────────────────────────────────────────────────────
const MOCK_MODE = true;
const MLB_BASE  = 'https://statsapi.mlb.com/api/v1';

// ── State ────────────────────────────────────────────────────────────────────
let gameStates     = {};   // gamePk -> game state object
let feedItems      = [];   // all feed items, newest first
let mockPlayPtrs   = {};   // gamePk -> index of next play to emit
let mockGameQueue  = [];   // rotating round-robin of gamePks
let mockTimerId    = null;
let mockSpeedMs    = 6000;
let totalMockPlays = 0;
let playedMockPlays= 0;
let alertId        = 0;

// ── Entry point ──────────────────────────────────────────────────────────────
function init() {
  if (MOCK_MODE) initMock();
  else           initReal();
}

// ── Mock init ────────────────────────────────────────────────────────────────
function initMock() {
  document.getElementById('mockBadge').style.display = '';
  document.getElementById('mockBar').style.display   = '';

  totalMockPlays  = 0;
  playedMockPlays = 0;
  gameStates      = {};
  mockPlayPtrs    = {};
  mockGameQueue   = [];

  MOCK_DATA.games.forEach(function(g) {
    var away = TC[g.awayId] || {primary:'#444', abbr:'???', name:'Unknown'};
    var home = TC[g.homeId] || {primary:'#444', abbr:'???', name:'Unknown'};
    gameStates[g.gamePk] = {
      gamePk:      g.gamePk,
      awayId:      g.awayId,
      homeId:      g.homeId,
      awayAbbr:    away.abbr,
      homeAbbr:    home.abbr,
      awayName:    away.name,
      homeName:    home.name,
      awayPrimary: away.primary,
      homePrimary: home.primary,
      awayScore:   0,
      homeScore:   0,
      status:      g.status,   // 'Live' | 'Preview' | 'Final'
      inning:      1,
      halfInning:  'top',
      outs:        0,
    };
    mockPlayPtrs[g.gamePk] = 0;
    totalMockPlays += (MOCK_DATA.plays[g.gamePk] || []).length;
    mockGameQueue.push(g.gamePk);
  });

  renderTicker();
  renderFeed();
  updateHeader();
  startMockTick();
}

function startMockTick() {
  if (mockTimerId) clearInterval(mockTimerId);
  mockTimerId = setInterval(mockTick, mockSpeedMs);
  setTimeout(mockTick, 400);
}

// ── Game ticker ──────────────────────────────────────────────────────────────
function renderTicker() {
  var ticker = document.getElementById('gameTicker');
  var states = Object.values(gameStates);

  if (!states.length) {
    ticker.innerHTML = '<span class="ticker-empty">No games loaded</span>';
    return;
  }

  var html = '';
  states.forEach(function(g) {
    var isLive  = g.status === 'Live';
    var isFinal = g.status === 'Final';
    var isPre   = g.status === 'Preview';

    var statusClass = isLive  ? 'status-live'
                    : isFinal ? 'status-final'
                    : isPre   ? 'status-preview'
                    : '';

    var half   = g.halfInning === 'top' ? '▲' : '▼';
    var innStr = isLive  ? (half + g.inning)
               : isFinal ? 'FINAL'
               : 'PRE';

    var dot = isLive ? '<div class="ticker-live-dot"></div>' : '';

    html += '<div class="ticker-game ' + statusClass + '" onclick="scrollToGame(' + g.gamePk + ')">'
          + dot
          + '<span class="ticker-score">' + g.awayAbbr + '&nbsp;<strong>' + g.awayScore + '</strong></span>'
          + '<span class="ticker-divider">·</span>'
          + '<span class="ticker-score"><strong>' + g.homeScore + '</strong>&nbsp;' + g.homeAbbr + '</span>'
          + '<span class="ticker-inning">' + innStr + '</span>'
          + '</div>';
  });

  ticker.innerHTML = html;
}

// ── Header ───────────────────────────────────────────────────────────────────
function updateHeader() {
  var liveCount = Object.values(gameStates).filter(function(g) {
    return g.status === 'Live';
  }).length;

  var dot = document.getElementById('pulseDot');
  if (liveCount > 0) {
    dot.classList.add('live');
  } else {
    dot.classList.remove('live');
  }

  document.getElementById('liveCount').textContent =
    liveCount === 0 ? 'No games live'
    : liveCount === 1 ? '1 game live'
    : liveCount + ' games live';

  var lu = document.getElementById('lastUpdate');
  lu.textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', second: '2-digit'
  });
  lu.style.display = '';
}

// ── Utils ────────────────────────────────────────────────────────────────────
function ordinal(n) {
  if (n === 1) return '1st';
  if (n === 2) return '2nd';
  if (n === 3) return '3rd';
  return n + 'th';
}

function localDateStr(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}

function scrollToGame(gamePk) {
  var el = document.querySelector('[data-gamepk="' + gamePk + '"]');
  if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

// ── Feed ─────────────────────────────────────────────────────────────────────
function addFeedItem(gamePk, data) {
  var item = {gamePk: gamePk, data: data, ts: new Date()};
  feedItems.unshift(item);
  prependFeedItem(item);
  document.getElementById('feedEmpty').style.display = 'none';
}

function prependFeedItem(item) {
  var el  = buildFeedEl(item);
  var feed = document.getElementById('feed');
  feed.insertBefore(el, feed.firstChild);
}

function buildFeedEl(item) {
  var el = document.createElement('div');
  var g  = gameStates[item.gamePk];
  var d  = item.data;

  // ── Status-change item ────────────────────────────────────────────────────
  if (d.type === 'status') {
    el.className = 'feed-item status-change';
    el.setAttribute('data-gamepk', item.gamePk);
    el.innerHTML =
      '<div class="status-row">'
      + '<span class="status-icon">' + d.icon + '</span>'
      + '<span class="status-label">' + d.label + '</span>'
      + '<span class="status-sub">' + d.sub + '</span>'
      + '</div>';
    return el;
  }

  // ── Play item ─────────────────────────────────────────────────────────────
  var cls = 'feed-item';
  if      (d.playClass === 'homerun')  cls += ' homerun';
  else if (d.playClass === 'scoring')  cls += ' scoring';
  else if (d.playClass === 'risp')     cls += ' risp';
  el.className = cls;
  el.setAttribute('data-gamepk', item.gamePk);

  var half    = d.halfInning === 'top' ? '▲' : '▼';
  var innStr  = half + ordinal(d.inning);
  var outsStr = d.outs === 1 ? '1 out' : d.outs + ' outs';
  var timeStr = item.ts.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});

  // Coloured team dots + score line
  var metaHtml =
    '<div class="feed-meta">'
    + '<span class="feed-game-tag">'
    + '<span class="feed-team-dot" style="background:' + g.awayPrimary + '"></span>'
    + g.awayAbbr + '&nbsp;<strong>' + d.awayScore + '</strong>'
    + '</span>'
    + '<span class="feed-sep">·</span>'
    + '<span class="feed-game-tag">'
    + '<strong>' + d.homeScore + '</strong>&nbsp;' + g.homeAbbr
    + '<span class="feed-team-dot" style="background:' + g.homePrimary + '"></span>'
    + '</span>'
    + '<span class="feed-sep">·</span>'
    + '<span>' + innStr + '</span>'
    + '<span class="feed-sep">·</span>'
    + '<span>' + outsStr + '</span>'
    + '<span class="feed-time">' + timeStr + '</span>'
    + '</div>';

  // Optional RISP tag (only when not already a scoring play)
  var rispHtml = (d.risp && !d.scoring)
    ? '<div class="risp-tag">RISP</div>'
    : '';

  // Play icon prefix
  var icon = d.event === 'Home Run' ? '💥 '
           : d.scoring              ? '🔴 '
           : '';

  // Score badge appended to scoring plays
  var scoreBadge = d.scoring
    ? '<span class="feed-score-badge">' + d.awayScore + '–' + d.homeScore + '</span>'
    : '';

  var playHtml =
    '<div class="feed-play">' + icon + d.desc + scoreBadge + '</div>';

  el.innerHTML = metaHtml + rispHtml + playHtml;
  return el;
}

function renderFeed() {
  var feed = document.getElementById('feed');
  feed.innerHTML = '';
  feedItems.forEach(function(item) {
    feed.appendChild(buildFeedEl(item));
  });
  document.getElementById('feedEmpty').style.display = feedItems.length ? 'none' : '';
}

// ── Alerts ────────────────────────────────────────────────────────────────────
function showAlert(opts) {
  var id       = ++alertId;
  var icon     = opts.icon     || '🔔';
  var evtLabel = opts.event    || '';
  var desc     = opts.desc     || '';
  var color    = opts.color    || '#e03030';
  var duration = opts.duration || 5000;

  var stack = document.getElementById('alertStack');
  var el    = document.createElement('div');
  el.className = 'alert-toast';
  el.style.borderLeftColor = color;
  el.style.setProperty('--toast-duration', duration + 'ms');
  el.innerHTML =
    '<span class="alert-icon">'  + icon     + '</span>'
    + '<div class="alert-body">'
    +   '<div class="alert-event">' + evtLabel + '</div>'
    +   '<div class="alert-desc">'  + desc     + '</div>'
    + '</div>'
    + '<div class="alert-progress"></div>';

  el.addEventListener('click', function() { dismissAlert(el); });
  stack.appendChild(el);

  setTimeout(function() { dismissAlert(el); }, duration);
}

function dismissAlert(el) {
  if (!el.parentNode) return;
  el.classList.add('dismissing');
  setTimeout(function() { el.remove(); }, 300);
}
