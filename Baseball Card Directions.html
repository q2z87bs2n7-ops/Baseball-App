<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Baseball Card — Final Handoff</title>
<style>
  body { margin:0; background:#f4f1ea; font-family: Helvetica, Arial, sans-serif; color:#1a1a1a; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="final-cards.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const Notes = ({ kicker, title, children }) => (
  <div style={{ width: 320, fontFamily: "Helvetica, Arial, sans-serif", color: "#3a3a3a", fontSize: 13, lineHeight: 1.55 }}>
    {kicker && <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.2em", color: "#888", textTransform: "uppercase", marginBottom: 6 }}>{kicker}</div>}
    {title && <div style={{ fontSize: 18, fontWeight: 800, color: "#111", marginBottom: 10, letterSpacing: "-0.01em" }}>{title}</div>}
    <div>{children}</div>
  </div>
);
const Bullet = ({ children }) => (
  <div style={{ display:"flex", gap:8, marginBottom:6 }}>
    <span style={{ color:"#888" }}>•</span><span>{children}</span>
  </div>
);

// Rotation: cycles through (player × badge) every N seconds for liveness
function useRotation(items, ms = 3500) {
  const [i, setI] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setI(x => (x+1) % items.length), ms);
    return () => clearInterval(t);
  }, [items.length, ms]);
  return items[i];
}

const ROTATIONS = SAMPLE_PLAYERS.flatMap(p => SAMPLE_BADGES.map(b => ({ p, badge: b })));

const Rotator = ({ Comp }) => {
  const r = useRotation(ROTATIONS);
  return <Comp p={r.p} badge={r.badge}/>;
};

function App() {
  return (
    <DesignCanvas title="HR/RBI Card — Final 4 for handoff" subtitle="V1 Stylized · V2 Jumbotron · V3 Comic · V4 Broadcast — rotating sample players + badges" defaultZoom={0.78}>

      <DCSection id="brief" title="Read me first">
        <DCArtboard id="brief-card" label="Handoff brief" width={680} height={520} background="#faf7f0">
          <div style={{ padding: 28 }}>
            <div style={{ fontSize: 11, fontWeight:800, letterSpacing:"0.2em", color:"#888", textTransform:"uppercase", marginBottom:8 }}>For Claude Code</div>
            <div style={{ fontSize: 22, fontWeight: 800, color:"#111", marginBottom: 18 }}>Four card styles, app picks one at random per popup</div>
            <div style={{ fontSize: 13.5, color:"#333", lineHeight: 1.65 }}>
              <p><b>Goal:</b> replace the current Pulse HR/RBI popup styling with these four directions. <b>The app picks one at random</b> for each popup — no user setting, no preference. Variety is the feature.</p>
              <p><b>Cards animate to 320×448 (2.5:3.5).</b> Same overlay/dismiss behavior as today.</p>
              <p style={{ background:"#fff", border:"1px solid #e5e0d0", borderRadius:6, padding:"12px 16px" }}>
                <b>Two requirements I baked in:</b><br/>
                <b>1. Dynamic event text</b> — Each card has a designed slot for the badge string returned by <code>getHRBadge()</code> / <code>getRBIBadge()</code> (HOME RUN, GO-AHEAD HOME RUN, GRAND SLAM, WALK-OFF HOME RUN, WALK-OFF GRAND SLAM, RBI DOUBLE, GO-AHEAD RBI, etc.). It's no longer a generic pill — it's part of the design (top rule, scoreboard strip, comic stamp, broadcast graphic). Text auto-shrinks for long strings like "WALK-OFF GRAND SLAM."<br/><br/>
                <b>2. Headshot framing</b> — MLB API returns standardized portraits (transparent bg, head + shoulders, eyes ~25% from top). To avoid cropped faces, <b>contain the photo inside its container, don't cover-fill it.</b> Use <code>background-size: auto 100%</code> (V4) or <code>background-size: 82-85% auto</code> for circular containers (V1, V3) so the entire portrait sits inside, with team-primary as <code>background-color</code> behind any transparent margin. Use <code>w_640,q_auto:best</code> for retina. Result: never a cropped forehead — worst case is a little extra space around the player.
              </p>
              <p style={{ marginTop: 14 }}><b>Each card below cycles through 3 players × 7 event types every 3.5s</b> so you can verify the layout holds across name lengths, team colors, and event-text lengths.</p>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="v1" title="V1 — Stylized Graphic">
        <DCArtboard id="v1-rot" label="Rotating preview" width={320} height={448}><Rotator Comp={V1_Stylized}/></DCArtboard>
        <DCArtboard id="v1-notes" label="Notes" width={340} height={448} background="#faf7f0">
          <div style={{ padding:22 }}>
            <Notes kicker="V1" title="Stylized Graphic">
              <Bullet>Editorial layout — stacked typographic lastname, slash + halftone, masked photo</Bullet>
              <Bullet><b>Event text:</b> uppercase letter-spaced rule across the top — replaces the orange pill</Bullet>
              <Bullet><b>Headshot:</b> 165×165 circle, bg-size 180%, position center 12% (zoomed out + eyes high)</Bullet>
              <Bullet>Stats footer: solid black, accent-color HR cell</Bullet>
              <Bullet>Personality: <i>designed, sharp, considered</i></Bullet>
            </Notes>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="v2" title="V2 — Stadium Jumbotron">
        <DCArtboard id="v2-rot" label="Rotating preview" width={320} height={448}><Rotator Comp={V2_Jumbotron}/></DCArtboard>
        <DCArtboard id="v2-notes" label="Notes" width={340} height={448} background="#faf7f0">
          <div style={{ padding:22 }}>
            <Notes kicker="V2" title="Stadium Jumbotron">
              <Bullet>Black canvas, glowing amber LED scoreboard top strip</Bullet>
              <Bullet><b>Event text:</b> sits in the scoreboard strip next to LIVE indicator — feels like the ballpark display reacting</Bullet>
              <Bullet><b>Headshot:</b> 200px tall rect, bg-size 115%, position center 8%, with CRT scanlines + team color halo</Bullet>
              <Bullet>Monospace amber player name w/ glow</Bullet>
              <Bullet>4 LED stat panels, HR cell glows</Bullet>
              <Bullet>Personality: <i>live, electric, in-stadium energy</i></Bullet>
            </Notes>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="v3" title="V3 — Comic Book / Pop Art">
        <DCArtboard id="v3-rot" label="Rotating preview" width={320} height={448}><Rotator Comp={V3_Comic}/></DCArtboard>
        <DCArtboard id="v3-notes" label="Notes" width={340} height={448} background="#faf7f0">
          <div style={{ padding:22 }}>
            <Notes kicker="V3" title="Comic Book / Pop Art">
              <Bullet>Cream paper, red Lichtenstein halftones, yellow burst behind player</Bullet>
              <Bullet><b>Event text:</b> the tilted red comic stamp top-left — auto-shrinks for long strings, "!" appended</Bullet>
              <Bullet><b>Headshot:</b> 180×180 circle on yellow burst, bg-size 150%, position center 8%, posterized + black outline</Bullet>
              <Bullet>Italicized stroke-outlined name; primary-blue stat panel w/ thick black borders</Bullet>
              <Bullet>Personality: <i>playful, distinct, memorable</i></Bullet>
            </Notes>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="v4" title="V4 — Sports Broadcast">
        <DCArtboard id="v4-rot" label="Rotating preview" width={320} height={448}><Rotator Comp={V4_Broadcast}/></DCArtboard>
        <DCArtboard id="v4-notes" label="Notes" width={340} height={448} background="#faf7f0">
          <div style={{ padding:22 }}>
            <Notes kicker="V4" title="Sports Broadcast Lower-Third">
              <Bullet>Dark canvas, team-color swoosh + secondary slash, LIVE bug top-right</Bullet>
              <Bullet><b>Event text:</b> the big skewed/italicized graphic mid-card — TV motion-graphic style, dynamic length-aware</Bullet>
              <Bullet><b>Headshot:</b> 230px tall full-bleed, bg-size auto 105%, position center 18%, masked top + bottom for cinematic feel</Bullet>
              <Bullet>Lower-third nameplate w/ angled jersey # chip</Bullet>
              <Bullet>Personality: <i>premium TV broadcast, "this is happening right now"</i></Bullet>
            </Notes>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="implementation" title="Implementation notes for Claude Code">
        <DCArtboard id="impl" label="What to change in index.html" width={680} height={680} background="#faf7f0">
          <div style={{ padding: 28, fontSize: 13.5, lineHeight: 1.6, color: "#333" }}>
            <div style={{ fontSize: 11, fontWeight:800, letterSpacing:"0.2em", color:"#888", textTransform:"uppercase", marginBottom:8 }}>Specifics</div>
            <div style={{ fontSize: 20, fontWeight: 800, color:"#111", marginBottom: 18 }}>Mapping the design to current code</div>

            <div style={{ marginBottom: 18 }}>
              <div style={{ fontWeight:700, color:"#111", marginBottom:4 }}>1. Random selection per popup</div>
              <div>No user setting. Inside <code>showPlayerCard()</code> pick a variant with <code>['v1','v2','v3','v4'][Math.floor(Math.random()*4)]</code> on each call and render that template. Optional: avoid showing the same variant twice in a row by tracking the last one in a module-level var.</div>
            </div>

            <div style={{ marginBottom: 18 }}>
              <div style={{ fontWeight:700, color:"#111", marginBottom:4 }}>2. Event text slot (the badge logic stays untouched)</div>
              <div><code>getHRBadge()</code> and <code>getRBIBadge()</code> already return the right strings — keep them. In <code>showPlayerCard()</code> (line ~2970 and the RBI variant ~3139), replace the <code>.pc-event-badge</code> div with a card-style-specific slot:
              <ul style={{ margin: "6px 0 0 18px", padding:0 }}>
                <li>V1 → <code>.pc-event-rule</code> (top, letter-spaced, underline)</li>
                <li>V2 → <code>.pc-event-led</code> (in scoreboard strip, glow)</li>
                <li>V3 → <code>.pc-event-stamp</code> (tilted red, append "!")</li>
                <li>V4 → <code>.pc-event-skew</code> (skewX, dynamic font-size)</li>
              </ul>
              Drop the 💥 emoji from the default — the styling carries the emphasis now.</div>
            </div>

            <div style={{ marginBottom: 18 }}>
              <div style={{ fontWeight:700, color:"#111", marginBottom:4 }}>3. Headshot framing fixes (apply to ALL variants)</div>
              <ul style={{ margin: "6px 0 0 18px", padding:0 }}>
                <li>Bump URL from <code>w_213</code> → <code>w_640,q_auto:best</code> for retina</li>
                <li><b>Contain, don't cover.</b> V1 + V3 (circles): <code>background-size: 82-85% auto</code>. V2 + V4 (rectangles): <code>background-size: auto 100%</code></li>
                <li>Always set <code>background-color</code> to team primary so transparent margins match</li>
                <li>Always <code>background-repeat: no-repeat</code></li>
                <li>Rule of thumb: <i>show the whole portrait, even if there's empty space</i> — too much photo &gt; cropped face</li>
              </ul>
            </div>

            <div style={{ marginBottom: 18 }}>
              <div style={{ fontWeight:700, color:"#111", marginBottom:4 }}>4. Team colors</div>
              <div>Keep using the existing <code>TEAMS</code> table. Each card consumes <code>primary</code> + <code>secondary</code> as CSS variables — Mets cards use orange accent, Yankees navy/red, etc. Verify all 30 teams render OK by spot-checking a dark-secondary team (Orioles) and a bright-secondary team (A's gold).</div>
            </div>

            <div>
              <div style={{ fontWeight:700, color:"#111", marginBottom:4 }}>5. Animations</div>
              <div>Keep the existing <code>@keyframes card-in</code>. Optional polish per variant: V2 a 200ms LED-flicker on entry; V3 a slight rotate-bounce on the comic stamp; V4 a slide-in from left on the skewed graphic. Skip on first pass — get the static look right first.</div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
